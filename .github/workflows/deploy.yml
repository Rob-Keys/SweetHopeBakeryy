name: Deploy to Lightsail

on:
  push:
    branches:
      - prod

jobs:
  deploy:
    name: Deploy to Lightsail
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          HOST: ${{ secrets.LIGHTSAIL_HOST }}
        run: |
          # Setup SSH key
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Add host to known_hosts
          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts

          # Execute deployment
          ssh -i ~/.ssh/deploy_key bitnami@$HOST << 'EOF'
            cd ~/bakehouse

            # Backup current code
            BACKUP_DIR="backup"
            mkdir -p $BACKUP_DIR
            cp -r . $BACKUP_DIR/
            echo "Backup created at $BACKUP_DIR"

            # Pull latest code
            git fetch origin prod
            git reset --hard origin/prod
            git pull origin prod --force

            # Restore database from backup
            cp -r $BACKUP_DIR/private/backend/db/data ~/bakehouse/private/backend/db/data

            # Set file permissions for customize writing
            sudo chown daemon:daemon ~/bakehouse/private/backend/db/data/*.json
            sudo chmod 766 ~/bakehouse/private/backend/db/data/*.json

            composer install --no-dev --optimize-autoloader

            echo "Deployment completed at $(date)"
          EOF
